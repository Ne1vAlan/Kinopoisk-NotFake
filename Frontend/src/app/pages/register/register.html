<!-- Yerdaulet's part -->
<div class="auth-page">
  <div class="auth-card">
    <h2>Регистрация</h2>
    <p class="error" *ngIf="error">{{ error }}</p>
    <div class="form-group">
      <label>Логин</label>
      <input [(ngModel)]="username" type="text" placeholder="Придумайте логин" name="username" />
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input [(ngModel)]="password" type="password" placeholder="Придумайте пароль" name="password" />
    </div>
    <button class="btn-submit" (click)="onSubmit()" [disabled]="loading">
      {{ loading ? 'Создаём аккаунт...' : 'Зарегистрироваться' }}
    </button>
    <p class="switch-auth">Уже есть аккаунт? <a routerLink="/login">Войти</a></p>
  </div>
</div>
