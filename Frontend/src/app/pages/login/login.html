<div class="auth-page">
  <div class="auth-card">
    <h2>Войти</h2>
    <p class="error" *ngIf="error">{{ error }}</p>
    <div class="form-group">
      <label>Логин</label>
      <input [(ngModel)]="username" type="text" placeholder="Введите логин" name="username" />
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input [(ngModel)]="password" type="password" placeholder="Введите пароль" name="password" />
    </div>
    <button class="btn-submit" (click)="onSubmit()" [disabled]="loading">
      {{ loading ? 'Входим...' : 'Войти' }}
    </button>
    <p class="switch-auth">Нет аккаунта? <a routerLink="/register">Зарегистрируйся</a></p>
  </div>
</div>
