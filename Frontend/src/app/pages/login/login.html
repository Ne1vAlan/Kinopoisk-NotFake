<div class="page">
  <div class="login-box">
    <h2 class="title">Login</h2>

    <form (ngSubmit)="onSubmit()">
      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
        required
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      />

      <button type="submit">Login</button>
    </form>

    <p class="error" *ngIf="error">{{ error }}</p>
  </div>
</div>
