<!-- Yerdaulet's part -->
<nav class="navbar">
  <a class="logo" routerLink="/">🎬 КиноПоиск</a>
  <div class="nav-links">
    <ng-container *ngIf="authService.isLoggedIn(); else guestLinks">
      <span class="username">👤 {{ authService.getUsername() }}</span>
      <button class="btn-logout" (click)="logout()">Выйти</button>
    </ng-container>
    <ng-template #guestLinks>
      <a routerLink="/login">Войти</a>
      <a routerLink="/register" class="btn-register">Регистрация</a>
    </ng-template>
  </div>
</nav>
