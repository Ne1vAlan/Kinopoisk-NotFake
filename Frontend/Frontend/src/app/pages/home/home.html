<div class="home-page">
  <div class="search-bar">
    <input
      type="text"
      placeholder="🔍 Поиск фильма..."
      (input)="onSearch($any($event.target).value)"
    />
  </div>

  <div class="loading" *ngIf="loading">Загрузка...</div>

  <div class="empty" *ngIf="!loading && filteredMovies.length === 0">
    Фильмы не найдены
  </div>

  <div class="movies-grid" *ngIf="!loading && filteredMovies.length > 0">
    <app-movie-card
      *ngFor="let movie of filteredMovies"
      [movie]="movie">
    </app-movie-card>
  </div>
</div>
